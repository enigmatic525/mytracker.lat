<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Calorie Tracker</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d0f12">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" href="icon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="date-nav">
                <button class="nav-btn" id="btn-prev-day" aria-label="Previous day">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 18l-6-6 6-6" />
                    </svg>
                </button>
                <div class="date-titles">
                    <h1 id="day-label">Today</h1>
                    <p class="date" id="current-date">Monday, Oct 24</p>
                </div>
                <button class="nav-btn" id="btn-next-day" aria-label="Next day" disabled>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 18l6-6-6-6" />
                    </svg>
                </button>
            </div>
        </header>

        <!-- Chart Section -->
        <section class="chart-section" id="chart-section" aria-label="Weekly Progress Chart">
            <div id="weekly-difference-label"
                style="position: absolute; top: 12px; left: 16px; font-size: 13px; color: var(--text-secondary); font-weight: var(--font-weight-medium); z-index: 5;">
                This week: 0</div>
            <div class="chart-container">
                <div class="chart-plot-area">
                    <div class="chart-goal-line" id="chart-maintenance-line"></div>
                    <div class="chart-goal-line" id="chart-goal-line"></div>
                    <div class="chart-bars" id="chart-bars">
                        <!-- Bars inserted by JS -->
                    </div>
                </div>
                <div class="chart-labels-row" id="chart-labels-row">
                    <!-- Labels inserted by JS -->
                </div>
            </div>
        </section>

        <div style="display: flex; flex-direction: column; gap: 24px;">
            <!-- Daily Progress Bar -->
            <section class="progress-section">
                <div class="progress-header" style="display: flex; justify-content: flex-end; margin-bottom: 8px;">
                    <span id="calories-left"
                        style="font-size: 13px; color: var(--text-secondary); font-weight: var(--font-weight-regular);">2000
                        remaining</span>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar-fill" id="progress-bar-fill"></div>
                </div>
            </section>

            <!-- Metrics Row -->
            <section class="metrics-row" style="display: flex; justify-content: space-evenly;">
                <div class="metric-item" id="metric-maint" role="button" tabindex="0" title="Edit Maintenance"
                    style="text-align: center; cursor: pointer;">
                    <div
                        style="font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; font-weight: var(--font-weight-regular);">
                        Maintenance</div>
                    <div
                        style="font-size: 18px; font-weight: var(--font-weight-medium); color: var(--text-primary); position: relative; display: inline-block;">
                        <span id="metric-maint-val">2500</span>
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2"
                            style="position: absolute; top: 0px; right: -16px; color: var(--text-secondary);">
                            <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path>
                        </svg>
                    </div>
                </div>
                <div class="metric-item" id="metric-goal" role="button" tabindex="0" title="Edit Goal"
                    style="text-align: center; cursor: pointer;">
                    <div
                        style="font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; font-weight: var(--font-weight-regular);">
                        Goal</div>
                    <div
                        style="font-size: 18px; font-weight: var(--font-weight-medium); color: var(--text-primary); position: relative; display: inline-block;">
                        <span id="metric-goal-val">2000</span>
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2"
                            style="position: absolute; top: 0px; right: -16px; color: var(--text-secondary);">
                            <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path>
                        </svg>
                    </div>
                </div>
            </section>

            <!-- Main Tracker Section -->
            <section class="main-tracker-section">
                <button class="btn btn-icon-text outer-btn" id="btn-minus-100"
                    aria-label="Subtract 100 calories">-100</button>
                <button class="btn btn-icon-text inner-btn" id="btn-minus-50"
                    aria-label="Subtract 50 calories">-50</button>

                <div class="tracker-center">
                    <div class="calories-current editable-number" id="calories-current" role="button" tabindex="0"
                        title="Click to edit total">0</div>
                </div>

                <button class="btn btn-icon-text inner-btn" id="btn-plus-50" aria-label="Add 50 calories">+50</button>
                <button class="btn btn-icon-text outer-btn" id="btn-plus-100"
                    aria-label="Add 100 calories">+100</button>
            </section>
        </div>

        <!-- Presets Section -->
        <section class="presets-section">
            <div class="presets-header">
                <h2>Presets</h2>
                <button class="btn-text" id="btn-add-preset">+ Add New</button>
            </div>
            <div class="presets-grid" id="presets-grid">
                <!-- Presets will be generated here -->
            </div>
        </section>
    </div>

    <!-- Modal for Edit Calories -->
    <div class="modal-overlay" id="calories-modal">
        <div class="modal-content">
            <h3>Set Current Calories</h3>
            <input type="number" id="calories-input" class="modal-input" placeholder="e.g. 1500">
            <div class="modal-actions">
                <button class="btn btn-secondary" id="btn-cancel-calories">Cancel</button>
                <button class="btn btn-primary" id="btn-save-calories">Save</button>
            </div>
        </div>
    </div>

    <!-- Modal for Edit Goal -->
    <div class="modal-overlay" id="goal-modal">
        <div class="modal-content">
            <h3>Set Daily Goal</h3>
            <input type="number" id="goal-input" class="modal-input" placeholder="e.g. 2000">
            <div class="modal-actions">
                <button class="btn btn-secondary" id="btn-cancel-goal">Cancel</button>
                <button class="btn btn-primary" id="btn-save-goal">Save</button>
            </div>
        </div>
    </div>

    <!-- Modal for Edit Maintenance -->
    <div class="modal-overlay" id="maint-modal">
        <div class="modal-content">
            <h3>Set Maintenance</h3>
            <input type="number" id="maint-input" class="modal-input" placeholder="e.g. 2500">
            <div class="modal-actions">
                <button class="btn btn-secondary" id="btn-cancel-maint">Cancel</button>
                <button class="btn btn-primary" id="btn-save-maint">Save</button>
            </div>
        </div>
    </div>

    <!-- Modal for Add Preset -->
    <div class="modal-overlay" id="preset-modal">
        <div class="modal-content">
            <h3>Add New Preset</h3>
            <input type="text" id="preset-name-input" class="modal-input" placeholder="Name (e.g. Apple)">
            <input type="number" id="preset-cal-input" class="modal-input" placeholder="Calories (e.g. 95)">
            <div class="modal-actions">
                <button class="btn btn-secondary" id="btn-cancel-preset">Cancel</button>
                <button class="btn btn-primary" id="btn-save-preset">Save</button>
            </div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(registration => {
                    console.log('SW registered: ', registration.scope);
                }).catch(err => {
                    console.log('SW registration failed: ', err);
                });
            });

            // Auto-reload the page when a new service worker takes over (fixes PWA cache locks)
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!refreshing) {
                    refreshing = true;
                    window.location.reload();
                }
            });
        }
    </script>
    <script src="script.js"></script>
</body>

</html>
