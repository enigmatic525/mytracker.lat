name: iOS

on:
  push:
    branches: [main]
    paths:
      - "ios/**"
      - ".github/workflows/ios.yml"
  pull_request:
    paths:
      - "ios/**"
      - ".github/workflows/ios.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  core-checks:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Verify Swift core
        run: swift run --package-path ios/MyTrackerCore MyTrackerCoreChecks

  simulator-build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate
      - name: Build for iPhone Simulator
        working-directory: ios
        run: >-
          xcodebuild
          -project MyTracker.xcodeproj
          -scheme MyTracker
          -configuration Debug
          -sdk iphonesimulator
          -destination 'generic/platform=iOS Simulator'
          CODE_SIGNING_ALLOWED=NO
          build
